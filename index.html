<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx0i0AticIQfYud7vMJCvZZ7QhxZx9srgULGGTXCwmxdDHqIGzW7FKgGHy5nUxkX_XWWw/exec";

const registerForm = document.getElementById("registerForm");
const checkForm = document.getElementById("checkForm");

const registerStatus = document.getElementById("registerStatus");
const checkStatus = document.getElementById("checkStatus");

const cardResult = document.getElementById("cardResult");

function normalizeNumber(number) {
  let value = String(number || "")
    .replace(/\s+/g, "")
    .replace(/-/g, "")
    .trim();

  if (value.startsWith("+63")) {
    value = "0" + value.substring(3);
  }

  if (value.startsWith("63") && value.length === 12) {
    value = "0" + value.substring(2);
  }

  return value;
}

function showStatus(element, message, type = "success") {
  element.textContent = message;
  element.className = `status ${type}`;
}

registerForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("registerName").value.trim();
  const contact = normalizeNumber(
    document.getElementById("registerContact").value
  );

  try {
    const formData = new URLSearchParams();
    formData.append("name", name);
    formData.append("contact", contact);

    const response = await fetch(API_URL, {
      method: "POST",
      body: formData
    });

    const data = await response.json();

    if (data.error) {
      showStatus(registerStatus, data.error, "error");
      return;
    }

    showStatus(
      registerStatus,
      "Your loyalty card has been created and saved automatically."
    );

    registerForm.reset();

  } catch (err) {
    showStatus(
      registerStatus,
      "Registration failed. Please try again.",
      "error"
    );
  }
});

checkForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  const contact = normalizeNumber(
    document.getElementById("checkContact").value
  );

  try {
    const response = await fetch(
      `${API_URL}?contact=${encodeURIComponent(contact)}`
    );

    const data = await response.json();

    if (data.error) {
      showStatus(checkStatus, "Customer not found.", "error");
      cardResult.innerHTML = "";
      return;
    }

    showStatus(checkStatus, "Card found.");

    const stamps = Number(data.stamps) || 0;
    const remaining = Math.max(10 - stamps, 0);

    let stampBoxes = "";

    for (let i = 0; i < 10; i++) {
      stampBoxes += `
        <div class="stamp-box ${i < stamps ? "filled" : ""}">
          <img src="https://i.imgur.com/6IUbEMN.png" alt="Stamp">
        </div>
      `;
    }

    cardResult.innerHTML = `
      <div class="card-profile">
        <div>
          <h3>${data.name}</h3>
          <p>${data.contact}</p>
        </div>

        <div class="badge">
          ${remaining > 0 ? `${remaining} to go` : "Reward Ready"}
        </div>
      </div>

      <p class="label">YOUR CURRENT STAMPS</p>

      <div class="stamp-grid">
        ${stampBoxes}
      </div>

      <div class="stamp-footer">
        <span>${stamps} / 10 stamps</span>
        <span>
          ${remaining > 0 ? `${remaining} more to go` : "Reward Available"}
        </span>
      </div>
    `;

  } catch (err) {
    showStatus(
      checkStatus,
      "Unable to retrieve card.",
      "error"
    );
  }
});
</script>
