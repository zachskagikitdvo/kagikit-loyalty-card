<!-- CUSTOMER CARD -->
<div class="customer-card" id="customerCard">

  <div class="customer-meta">

    <div>
      <div class="customer-name" id="customerName">
        Customer Name
      </div>

      <div class="customer-contact" id="customerContact">
        09XX XXX XXXX
      </div>
    </div>

    <div class="reward-status" id="rewardStatus">
      10 to go
    </div>

  </div>

  <div class="stamp-label">
    YOUR CURRENT STAMPS
  </div>

  <div class="stamp-grid" id="customerStampGrid"></div>

  <div class="card-footer">

    <div>
      <strong id="stampCountText">0</strong> / 10 stamps
    </div>

    <div id="remainingText">
      10 more to go
    </div>

  </div>

  <!-- EXPIRY INFO -->
  <div class="expiry-info" id="expiryInfo">

    <strong>Status:</strong> Not Started
    <br>

    <strong>Days Left:</strong> Not started yet

  </div>

  <p class="qr-note">
    Show this card when claiming your reward.
    The official stamp count is based on Zach's Kagikit customer tracker.
  </p>

</div>

<style>

.expiry-info {
  margin-top: 14px;
  padding: 12px 14px;
  border-radius: 14px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.14);
  color: rgba(255,255,255,0.86);
  font-size: 13px;
  line-height: 1.55;
}

.expiry-info strong {
  color: white;
}

</style>

<script>

const stamps = Number(customer.stamps) || 0;

const remaining = Math.max(0, 10 - stamps);

const cardStatus =
  customer.cardStatus || "Not Started";

const daysLeft =
  customer.daysLeft === "" ||
  customer.daysLeft === undefined
    ? null
    : Number(customer.daysLeft);

let daysText = "Not started yet";

if (cardStatus === "Expired") {

  daysText = "Expired";

} else if (
  daysLeft !== null &&
  !isNaN(daysLeft)
) {

  daysText =
    `${Math.max(0, daysLeft)} day${
      daysLeft == 1 ? "" : "s"
    } left`;
}

document.getElementById(
  "customerName"
).textContent =
  customer.name || "Customer";

document.getElementById(
  "customerContact"
).textContent =
  customer.contact || contact;

document.getElementById(
  "rewardStatus"
).textContent =
  cardStatus === "Expired"
    ? "Expired"
    : stamps >= 10
    ? "Reward Available"
    : `${remaining} to go`;

document.getElementById(
  "stampCountText"
).textContent =
  Math.min(stamps, 10);

document.getElementById(
  "remainingText"
).textContent =
  cardStatus === "Expired"
    ? "Card expired"
    : stamps >= 10
    ? "🎉 Free jar unlocked"
    : `${remaining} more to go`;

document.getElementById(
  "expiryInfo"
).innerHTML = `
  <strong>Status:</strong> ${cardStatus}<br>
  <strong>Days Left:</strong> ${daysText}
`;

buildStampGrid(
  "customerStampGrid",
  stamps
);

document
  .getElementById("customerCard")
  .classList.add("show");

</script>
